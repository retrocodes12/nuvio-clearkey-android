name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -1)
          cp "$APK" Nebula-1.4.0.apk
          cp "$APK" Nebula.apk
          gh release delete v1.4.0 -y --cleanup-tag 2>/dev/null || true
          gh release create v1.4.0 Nebula-1.4.0.apk Nebula.apk \
            --title "Nebula (Android phone + TV) v1.4.0" \
            --notes "Adds nebula://play deep-link support: tapping 'Open in Nebula Player' on a DASH stream in Stremio/Nuvio now launches Nebula straight into playback (or the download page if it isn't installed). The app also identifies itself to the Nebula Sports addon so it always gets direct ClearKey 4K/FHD DASH cards. Install (phone): allow 'install unknown apps' and tap the APK. Install (TV): open the Downloader app and enter code 7664693 (or da.gd/nebulaapk) — or sideload via 'adb install'. Nebula.apk is a stable-named copy so releases/latest/download/Nebula.apk, code 7664693 and da.gd/nebulaapk always point at the newest build."
