name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode signing keystore
        env:
          KS_B64: ${{ secrets.NEBULA_KEYSTORE_B64 }}
        run: printf '%s' "$KS_B64" | base64 -d > "$RUNNER_TEMP/nebula-release.jks"

      - name: Build release APK
        env:
          NEBULA_KEYSTORE_FILE: ${{ runner.temp }}/nebula-release.jks
          NEBULA_STORE_PASSWORD: ${{ secrets.NEBULA_STORE_PASSWORD }}
          NEBULA_KEY_ALIAS: ${{ secrets.NEBULA_KEY_ALIAS }}
          NEBULA_KEY_PASSWORD: ${{ secrets.NEBULA_KEY_PASSWORD }}
        run: >
          gradle assembleRelease --no-daemon --stacktrace
          "-PnebulaKeystore=$NEBULA_KEYSTORE_FILE"
          "-PnebulaStorePassword=$NEBULA_STORE_PASSWORD"
          "-PnebulaKeyAlias=$NEBULA_KEY_ALIAS"
          "-PnebulaKeyPassword=$NEBULA_KEY_PASSWORD"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" Nebula-1.7.0.apk
          cp "$APK" Nebula.apk
          gh release delete v1.7.0 -y --cleanup-tag 2>/dev/null || true
          gh release create v1.7.0 Nebula-1.7.0.apk Nebula.apk \
            --title "Nebula (Android phone + TV) v1.7.0" \
            --notes "One-tap in-app updates: the update card now downloads and installs the new version itself — no browser, no file managing. IMPORTANT: this build switches to a permanent signing key, so updating to v1.7.0 needs ONE last manual uninstall + reinstall. After that, every future update installs right over the top with no uninstall. Install (phone): allow 'install unknown apps' and tap the APK. Install (TV): Downloader code 7664693 (or da.gd/nebulaapk). Nebula.apk is a stable-named copy so releases/latest/download/Nebula.apk, code 7664693 and da.gd/nebulaapk always point at the newest build."
